<!DOCTYPE html>
<html><body>
<h2>🔊 语音测试</h2>
<p id="status">准备就绪</p>
<button onclick="testSpeech()">点我朗读 "Hello World"</button>
<script>
function testSpeech() {
  var s = document.getElementById('status');
  if (!window.speechSynthesis) { s.textContent = '❌ 不支持'; return; }
  var voices = window.speechSynthesis.getVoices();
  s.textContent = '语音引擎: ' + voices.length + ' 个';
  var u = new SpeechSynthesisUtterance('Hello World');
  u.lang = 'en-US';
  u.rate = 1;
  u.onstart = function() { s.textContent = '▶️ 正在播放...'; };
  u.onend = function() { s.textContent = '✅ 播放完成'; };
  u.onerror = function(e) { s.textContent = '❌ 错误: ' + e.error; };
  window.speechSynthesis.speak(u);
}
</script>
<h3 onclick="makeSound()">👆 点这里看有没有声音 (Web Audio beep)</h3>
<script>
function makeSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = 880;
    g.gain.value = 0.3;
    osc.start(); osc.stop(ctx.currentTime + 0.3);
    document.getElementById('status').textContent = '✅ 哔哔声播放';
  } catch(e) {
    document.getElementById('status').textContent = '❌ AudioContext错误: ' + e.message;
  }
}
document.addEventListener('click', function() {
  try { new AudioContext(); } catch(e) {}
}, {once:true});
</script>
</body></html>
